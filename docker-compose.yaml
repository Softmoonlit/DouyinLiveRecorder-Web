services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: ${DOUYIN_RECORDER_IMAGE:-douyin-live-recorder-web:phase4-local}
    ports:
      - "8000:8000"
    environment:
      - TERM=xterm-256color
    init: true
    tty: true
    stdin_open: true
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
      - ./backup_config:/app/backup_config
      - ./downloads:/app/downloads
    stop_grace_period: 40s
    restart: always
