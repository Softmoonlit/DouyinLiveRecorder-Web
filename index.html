<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="never">
    <title>DouyinLiveRecorder 控制台</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+SC:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-top: #081c2f;
            --bg-mid: #0d2f4a;
            --bg-bottom: #15365f;
            --card: rgba(255, 255, 255, 0.92);
            --ink: #0b1f35;
            --muted: #4e637a;
            --line: rgba(11, 31, 53, 0.12);
            --accent: #0ea5a6;
            --accent-deep: #0a7d7e;
            --warn: #f59e0b;
            --danger: #dc2626;
            --ok: #16a34a;
            --chip: #e6f4f4;
            --shadow: 0 18px 50px rgba(4, 20, 33, 0.25);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "IBM Plex Sans SC", "Microsoft YaHei", sans-serif;
            color: var(--ink);
            background:
                radial-gradient(circle at 0% 0%, rgba(14, 165, 166, 0.24), transparent 42%),
                radial-gradient(circle at 100% 100%, rgba(245, 158, 11, 0.2), transparent 40%),
                linear-gradient(140deg, var(--bg-top) 0%, var(--bg-mid) 48%, var(--bg-bottom) 100%);
            padding: 28px 16px 36px;
        }

        .shell {
            max-width: 1220px;
            margin: 0 auto;
            display: grid;
            gap: 18px;
            animation: fade-up .45s ease;
        }

        .panel {
            border: 1px solid rgba(255, 255, 255, 0.14);
            border-radius: 16px;
            background: var(--card);
            box-shadow: var(--shadow);
            backdrop-filter: blur(6px);
        }

        .header {
            padding: 18px 18px 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        h1 {
            margin: 0;
            font-size: 24px;
            letter-spacing: 0.3px;
        }

        .sub {
            margin: 6px 0 0;
            color: var(--muted);
            font-size: 14px;
        }

        .toolbar {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .toolbar label {
            font-size: 13px;
            color: var(--muted);
        }

        .toolbar select,
        .toolbar button,
        .editor input {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 8px 10px;
            font: inherit;
        }

        .btn {
            cursor: pointer;
            background: #fff;
            transition: all .2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-main {
            background: var(--accent);
            color: #fff;
            border-color: transparent;
        }

        .btn-main:hover {
            background: var(--accent-deep);
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(4, minmax(0, 1fr));
            gap: 10px;
            padding: 0 18px 18px;
        }

        .stat {
            background: #fff;
            border: 1px solid var(--line);
            border-radius: 12px;
            padding: 12px;
        }

        .stat-label {
            color: var(--muted);
            font-size: 12px;
        }

        .stat-value {
            font-size: 24px;
            font-weight: 700;
            margin-top: 6px;
        }

        .boards {
            display: grid;
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 12px;
            padding: 0 18px 18px;
        }

        .board {
            border: 1px solid var(--line);
            border-radius: 12px;
            background: #fff;
            min-height: 220px;
            display: flex;
            flex-direction: column;
        }

        .board h2 {
            margin: 0;
            padding: 12px;
            border-bottom: 1px solid var(--line);
            font-size: 15px;
            letter-spacing: 0.2px;
        }

        .board-body {
            padding: 10px;
            display: grid;
            gap: 8px;
            align-content: flex-start;
        }

        .task-card {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 10px;
            background: linear-gradient(150deg, #f7fbff, #eff7fc);
        }

        .task-title {
            font-weight: 600;
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .task-meta {
            margin-top: 6px;
            font-size: 12px;
            color: var(--muted);
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            padding: 2px 8px;
            border-radius: 999px;
            font-size: 12px;
            line-height: 18px;
            background: var(--chip);
            color: #0f4a4b;
        }

        .chip.warn {
            background: #fff5e4;
            color: #8f5a00;
        }

        .chip.danger {
            background: #ffe6e6;
            color: #931616;
        }

        .chip.ok {
            background: #e8f8ec;
            color: #0f6f30;
        }

        .empty {
            color: var(--muted);
            font-size: 13px;
            text-align: center;
            padding: 24px 8px;
        }

        .editor {
            border-top: 1px solid var(--line);
            padding: 14px 18px 18px;
            display: grid;
            grid-template-columns: 2fr 1fr 1fr auto;
            gap: 8px;
        }

        .table-wrap {
            overflow: auto;
            border-top: 1px solid var(--line);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 980px;
            font-size: 13px;
        }

        th,
        td {
            border-bottom: 1px solid var(--line);
            padding: 10px;
            text-align: left;
            vertical-align: top;
        }

        th {
            position: sticky;
            top: 0;
            background: #f5fbff;
            z-index: 1;
        }

        .ops {
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
            min-width: 250px;
        }

        .ops button {
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 4px 8px;
            background: #fff;
            cursor: pointer;
            font-size: 12px;
        }

        .ops .danger {
            color: #fff;
            background: var(--danger);
            border-color: transparent;
        }

        .ops .warn {
            background: #fff7eb;
            border-color: #f4d6a8;
            color: #8f5a00;
        }

        .ops .ok {
            background: #ecf9ef;
            border-color: #bce6c9;
            color: #0e6830;
        }

        .footer {
            color: rgba(255, 255, 255, 0.86);
            text-align: center;
            font-size: 12px;
            margin-top: 4px;
        }

        .modal {
            position: fixed;
            inset: 0;
            background: rgba(2, 14, 26, 0.45);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 20;
            padding: 16px;
        }

        .modal.open {
            display: flex;
        }

        .modal-card {
            width: min(560px, 100%);
            background: #fff;
            border-radius: 14px;
            border: 1px solid var(--line);
            box-shadow: var(--shadow);
            overflow: hidden;
        }

        .modal-head {
            padding: 12px 14px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-head h3 {
            margin: 0;
            font-size: 16px;
        }

        .modal-close {
            border: 1px solid var(--line);
            border-radius: 8px;
            background: #fff;
            cursor: pointer;
            width: 30px;
            height: 30px;
            font-size: 16px;
            line-height: 1;
        }

        .modal-body {
            padding: 14px;
            display: grid;
            gap: 10px;
        }

        .modal-body label {
            display: grid;
            gap: 6px;
            font-size: 13px;
            color: var(--muted);
        }

        .modal-body input {
            border: 1px solid var(--line);
            border-radius: 10px;
            padding: 9px 10px;
            font: inherit;
            color: var(--ink);
        }

        .modal-actions {
            border-top: 1px solid var(--line);
            padding: 12px 14px;
            display: flex;
            justify-content: flex-end;
            gap: 8px;
        }

        @keyframes fade-up {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (max-width: 1080px) {
            .stats {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }

            .boards {
                grid-template-columns: 1fr;
            }

            .editor {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="shell">
        <section class="panel">
            <div class="header">
                <div>
                    <h1>录制任务控制台</h1>
                    <p class="sub">任务表优先接 /api/v1/tasks，状态看板优先接 /api/v1/dashboard，默认 3 秒轮询。</p>
                </div>
                <div class="toolbar">
                    <label for="platformFilter">平台筛选</label>
                    <select id="platformFilter">
                        <option value="">全部平台</option>
                    </select>
                    <button id="refreshNow" class="btn">立即刷新</button>
                    <button id="togglePolling" class="btn btn-main">暂停轮询</button>
                </div>
            </div>

            <div class="stats" id="stats"></div>
            <div class="boards">
                <section class="board">
                    <h2>正在直播</h2>
                    <div class="board-body" id="board-live"></div>
                </section>
                <section class="board">
                    <h2>正在录制</h2>
                    <div class="board-body" id="board-recording"></div>
                </section>
                <section class="board">
                    <h2>未开播</h2>
                    <div class="board-body" id="board-not-live"></div>
                </section>
            </div>

            <form id="createTaskForm" class="editor">
                <input id="newTaskUrl" type="text" required placeholder="直播间 URL（必填）">
                <input id="newTaskQuality" type="text" value="原画" placeholder="画质，例如 原画">
                <input id="newTaskAnchor" type="text" placeholder="主播昵称（可选）">
                <button type="submit" class="btn btn-main">新增任务</button>
            </form>

            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>平台</th>
                            <th>主播</th>
                            <th>URL</th>
                            <th>画质</th>
                            <th>直播状态</th>
                            <th>录制状态</th>
                            <th>录制开始</th>
                            <th>错误信息</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="taskTableBody"></tbody>
                </table>
            </div>
        </section>
        <div class="footer">DouyinLiveRecorder Web Console (Phase 3)</div>
    </div>

    <div id="editModal" class="modal" aria-hidden="true">
        <div class="modal-card" role="dialog" aria-modal="true" aria-labelledby="editModalTitle">
            <div class="modal-head">
                <h3 id="editModalTitle">编辑任务</h3>
                <button type="button" class="modal-close" id="editModalClose" aria-label="关闭">×</button>
            </div>
            <form id="editTaskForm">
                <div class="modal-body">
                    <label>
                        URL
                        <input id="editTaskUrl" type="text" required>
                    </label>
                    <label>
                        画质
                        <input id="editTaskQuality" type="text" required>
                    </label>
                    <label>
                        主播昵称
                        <input id="editTaskAnchor" type="text">
                    </label>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn" id="editTaskCancel">取消</button>
                    <button type="submit" class="btn btn-main">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        const POLL_INTERVAL_MS = 3000;
        const state = {
            pollingEnabled: true,
            pollTimer: null,
            currentPlatform: "",
            tasks: [],
            dashboard: null,
            loading: false,
            editingTaskId: "",
        };

        const dom = {
            stats: document.getElementById("stats"),
            boardLive: document.getElementById("board-live"),
            boardRecording: document.getElementById("board-recording"),
            boardNotLive: document.getElementById("board-not-live"),
            taskTableBody: document.getElementById("taskTableBody"),
            platformFilter: document.getElementById("platformFilter"),
            refreshNow: document.getElementById("refreshNow"),
            togglePolling: document.getElementById("togglePolling"),
            createTaskForm: document.getElementById("createTaskForm"),
            newTaskUrl: document.getElementById("newTaskUrl"),
            newTaskQuality: document.getElementById("newTaskQuality"),
            newTaskAnchor: document.getElementById("newTaskAnchor"),
            editModal: document.getElementById("editModal"),
            editModalClose: document.getElementById("editModalClose"),
            editTaskForm: document.getElementById("editTaskForm"),
            editTaskCancel: document.getElementById("editTaskCancel"),
            editTaskUrl: document.getElementById("editTaskUrl"),
            editTaskQuality: document.getElementById("editTaskQuality"),
            editTaskAnchor: document.getElementById("editTaskAnchor"),
        };

        function openEditModal(task) {
            state.editingTaskId = task.task_id;
            dom.editTaskUrl.value = task.url || "";
            dom.editTaskQuality.value = task.quality || "原画";
            dom.editTaskAnchor.value = task.anchor_name || "";
            dom.editModal.classList.add("open");
            dom.editModal.setAttribute("aria-hidden", "false");
            dom.editTaskUrl.focus();
        }

        function closeEditModal() {
            state.editingTaskId = "";
            dom.editModal.classList.remove("open");
            dom.editModal.setAttribute("aria-hidden", "true");
            dom.editTaskForm.reset();
        }

        function escapeHtml(value) {
            return String(value || "")
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/\"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        function buildQuery(queryObj) {
            const params = new URLSearchParams();
            Object.entries(queryObj).forEach(([key, val]) => {
                if (val !== undefined && val !== null && String(val).trim() !== "") {
                    params.set(key, String(val));
                }
            });
            const query = params.toString();
            return query ? `?${query}` : "";
        }

        async function apiRequest(path, options = {}) {
            const response = await fetch(path, {
                headers: {
                    "Content-Type": "application/json",
                    ...(options.headers || {}),
                },
                ...options,
            });
            if (!response.ok) {
                let detail = response.statusText;
                try {
                    const payload = await response.json();
                    detail = payload.detail || payload.message || detail;
                } catch (e) {
                    // Keep status text when body is not JSON.
                }
                throw new Error(detail || "请求失败");
            }
            return response.json();
        }

        function formatTime(epochSec) {
            if (!epochSec) {
                return "-";
            }
            const date = new Date(epochSec * 1000);
            if (Number.isNaN(date.getTime())) {
                return "-";
            }
            return date.toLocaleString("zh-CN", { hour12: false });
        }

        function statusChip(type, text) {
            if (!text) {
                return "<span class=\"chip\">-</span>";
            }
            return `<span class=\"chip ${type}\">${escapeHtml(text)}</span>`;
        }

        function toLiveText(liveStatus) {
            const map = {
                live: "直播中",
                not_live: "未开播",
                disabled: "已禁用",
                unknown: "未知",
            };
            return map[liveStatus] || liveStatus || "未知";
        }

        function toRecordingText(recordingStatus) {
            const map = {
                recording: "录制中",
                stopping: "停止中",
                failed: "失败",
                idle: "空闲",
                disabled: "已禁用",
            };
            return map[recordingStatus] || recordingStatus || "未知";
        }

        function liveChip(liveStatus) {
            if (liveStatus === "live") {
                return statusChip("ok", "直播中");
            }
            if (liveStatus === "disabled") {
                return statusChip("danger", "已禁用");
            }
            if (liveStatus === "not_live") {
                return statusChip("", "未开播");
            }
            return statusChip("warn", "未知");
        }

        function recordingChip(recordingStatus) {
            if (recordingStatus === "recording") {
                return statusChip("ok", "录制中");
            }
            if (recordingStatus === "stopping") {
                return statusChip("warn", "停止中");
            }
            if (recordingStatus === "failed") {
                return statusChip("danger", "失败");
            }
            if (recordingStatus === "disabled") {
                return statusChip("danger", "已禁用");
            }
            return statusChip("", "空闲");
        }

        function renderStats(summary, byState) {
            if (!summary) {
                dom.stats.innerHTML = "<div class=\"empty\">暂无统计数据</div>";
                return;
            }

            const cards = [
                { label: "任务总数", value: summary.total || 0 },
                { label: "启用任务", value: summary.enabled || 0 },
                { label: "禁用任务", value: summary.disabled || 0 },
                { label: "录制中", value: summary.recording || 0 },
                { label: "监测中", value: summary.monitoring || 0 },
                { label: "直播未录制", value: summary.live_not_recording || 0 },
                { label: "停止中", value: summary.stopping || 0 },
                { label: "失败", value: summary.failed || 0 },
                { label: "未开播", value: summary.offline || 0 },
                { label: "State(offline)", value: byState.offline || 0 },
                { label: "State(recording)", value: byState.recording || 0 },
                { label: "State(monitoring)", value: byState.monitoring || 0 },
            ];

            dom.stats.innerHTML = cards
                .map((card) => `
                    <article class=\"stat\">
                        <div class=\"stat-label\">${escapeHtml(card.label)}</div>
                        <div class=\"stat-value\">${escapeHtml(card.value)}</div>
                    </article>
                `)
                .join("");
        }

        function renderTaskCards(container, list) {
            if (!list.length) {
                container.innerHTML = "<div class=\"empty\">当前分组无任务</div>";
                return;
            }

            container.innerHTML = list
                .slice(0, 20)
                .map((task) => `
                    <article class=\"task-card\">
                        <div class=\"task-title\">${escapeHtml(task.anchor_name || task.url)}</div>
                        <div class=\"task-meta\">
                            ${statusChip("", task.platform || "unknown")}
                            ${liveChip(task.live_status)}
                            ${recordingChip(task.recording_status)}
                        </div>
                    </article>
                `)
                .join("");
        }

        function renderBoards(items) {
            const live = items.filter((task) => task.live_status === "live");
            const recording = items.filter((task) => task.recording_status === "recording" || task.recording_status === "stopping");
            const notLive = items.filter((task) => task.live_status === "not_live");

            renderTaskCards(dom.boardLive, live);
            renderTaskCards(dom.boardRecording, recording);
            renderTaskCards(dom.boardNotLive, notLive);
        }

        function rowActions(task) {
            const encodedTaskId = encodeURIComponent(task.task_id);
            const actions = [
                `<button data-action=\"start\" data-task-id=\"${encodedTaskId}\" class=\"ok\">手动开始</button>`,
                `<button data-action=\"stop\" data-task-id=\"${encodedTaskId}\" class=\"warn\">手动停止</button>`,
            ];

            if (task.enabled) {
                actions.push(`<button data-action=\"disable\" data-task-id=\"${encodedTaskId}\" class=\"warn\">禁用(#)</button>`);
            } else {
                actions.push(`<button data-action=\"enable\" data-task-id=\"${encodedTaskId}\" class=\"ok\">恢复</button>`);
            }

            actions.push(`<button data-action=\"edit\" data-task-id=\"${encodedTaskId}\">编辑</button>`);
            actions.push(`<button data-action=\"delete\" data-task-id=\"${encodedTaskId}\" class=\"danger\">删除</button>`);

            return `<div class=\"ops\">${actions.join("")}</div>`;
        }

        function renderTable(items) {
            if (!items.length) {
                dom.taskTableBody.innerHTML = "<tr><td colspan=\"9\" class=\"empty\">暂无任务</td></tr>";
                return;
            }

            dom.taskTableBody.innerHTML = items
                .map((task) => `
                    <tr>
                        <td>${statusChip("", task.platform || "unknown")}</td>
                        <td>${escapeHtml(task.anchor_name || "-")}</td>
                        <td title="${escapeHtml(task.url)}">${escapeHtml(task.url)}</td>
                        <td>${escapeHtml(task.quality || "-")}</td>
                        <td>${liveChip(task.live_status)}</td>
                        <td>${recordingChip(task.recording_status)}</td>
                        <td>${escapeHtml(formatTime(task.started_at))}</td>
                        <td title="${escapeHtml(task.error_message || "")}">${escapeHtml(task.error_message || "-")}</td>
                        <td>${rowActions(task)}</td>
                    </tr>
                `)
                .join("");
        }

        function renderPlatformFilter(tasks) {
            const previousValue = dom.platformFilter.value;
            const platforms = Array.from(new Set(tasks.map((task) => task.platform || "unknown"))).sort();
            dom.platformFilter.innerHTML = "<option value=\"\">全部平台</option>" + platforms
                .map((platform) => `<option value=\"${escapeHtml(platform)}\">${escapeHtml(platform)}</option>`)
                .join("");

            if (platforms.includes(previousValue)) {
                dom.platformFilter.value = previousValue;
            }
        }

        async function loadData() {
            if (state.loading) {
                return;
            }

            state.loading = true;
            const query = buildQuery({ platform: state.currentPlatform });

            try {
                const [tasksResp, dashboardResp] = await Promise.all([
                    apiRequest(`/api/v1/tasks${query}`),
                    apiRequest(`/api/v1/dashboard${query}`),
                ]);

                state.tasks = Array.isArray(tasksResp.items) ? tasksResp.items : [];
                state.dashboard = dashboardResp || { summary: {}, by_state: {}, items: [] };

                renderPlatformFilter(state.tasks);
                renderStats(state.dashboard.summary || {}, state.dashboard.by_state || {});
                renderBoards(Array.isArray(state.dashboard.items) ? state.dashboard.items : []);
                renderTable(state.tasks);
            } catch (error) {
                alert(`刷新失败: ${error.message || error}`);
            } finally {
                state.loading = false;
            }
        }

        function getTaskById(taskId) {
            return state.tasks.find((task) => task.task_id === taskId) || null;
        }

        async function handleTaskAction(action, encodedTaskId) {
            const taskId = decodeURIComponent(encodedTaskId || "");
            if (!taskId) {
                return;
            }

            try {
                if (action === "start") {
                    await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}/start`, { method: "POST" });
                }

                if (action === "stop") {
                    await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}/stop?disable=false`, { method: "POST" });
                }

                if (action === "disable") {
                    await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}/stop?disable=true`, { method: "POST" });
                }

                if (action === "enable") {
                    await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}/start`, { method: "POST" });
                }

                if (action === "delete") {
                    const ok = window.confirm("确认删除该任务吗？");
                    if (!ok) {
                        return;
                    }
                    await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}`, { method: "DELETE" });
                }

                if (action === "edit") {
                    const task = getTaskById(taskId);
                    if (!task) {
                        throw new Error("找不到任务");
                    }

                    openEditModal(task);
                    return;
                }

                await loadData();
            } catch (error) {
                alert(`操作失败: ${error.message || error}`);
            }
        }

        function resetCreateForm() {
            dom.newTaskUrl.value = "";
            dom.newTaskQuality.value = "原画";
            dom.newTaskAnchor.value = "";
        }

        function startPolling() {
            stopPolling();
            state.pollingEnabled = true;
            dom.togglePolling.textContent = "暂停轮询";
            state.pollTimer = setInterval(loadData, POLL_INTERVAL_MS);
        }

        function stopPolling() {
            state.pollingEnabled = false;
            dom.togglePolling.textContent = "启动轮询";
            if (state.pollTimer) {
                clearInterval(state.pollTimer);
                state.pollTimer = null;
            }
        }

        dom.platformFilter.addEventListener("change", async (event) => {
            state.currentPlatform = String(event.target.value || "");
            await loadData();
        });

        dom.refreshNow.addEventListener("click", loadData);

        dom.togglePolling.addEventListener("click", () => {
            if (state.pollingEnabled) {
                stopPolling();
            } else {
                startPolling();
            }
        });

        dom.createTaskForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const url = dom.newTaskUrl.value.trim();
            const quality = dom.newTaskQuality.value.trim() || "原画";
            const anchorName = dom.newTaskAnchor.value.trim();

            if (!url) {
                alert("请先输入直播间 URL");
                return;
            }

            try {
                await apiRequest("/api/v1/tasks", {
                    method: "POST",
                    body: JSON.stringify({
                        url,
                        quality,
                        anchor_name: anchorName,
                    }),
                });
                resetCreateForm();
                await loadData();
            } catch (error) {
                alert(`创建失败: ${error.message || error}`);
            }
        });

        dom.taskTableBody.addEventListener("click", async (event) => {
            const target = event.target;
            if (!(target instanceof HTMLElement)) {
                return;
            }

            const action = target.dataset.action;
            const taskId = target.dataset.taskId;
            if (!action || !taskId) {
                return;
            }

            await handleTaskAction(action, taskId);
        });
        dom.editModalClose.addEventListener("click", closeEditModal);
        dom.editTaskCancel.addEventListener("click", closeEditModal);

        dom.editModal.addEventListener("click", (event) => {
            if (event.target === dom.editModal) {
                closeEditModal();
            }
        });

        window.addEventListener("keydown", (event) => {
            if (event.key === "Escape" && dom.editModal.classList.contains("open")) {
                closeEditModal();
            }
        });

        dom.editTaskForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            const taskId = state.editingTaskId;
            if (!taskId) {
                return;
            }

            const url = dom.editTaskUrl.value.trim();
            const quality = dom.editTaskQuality.value.trim() || "原画";
            const anchorName = dom.editTaskAnchor.value.trim();

            if (!url) {
                alert("URL 不能为空");
                return;
            }

            try {
                await apiRequest(`/api/v1/tasks/${encodeURIComponent(taskId)}`, {
                    method: "PUT",
                    body: JSON.stringify({
                        url,
                        quality,
                        anchor_name: anchorName,
                    }),
                });
                closeEditModal();
                await loadData();
            } catch (error) {
                alert(`保存失败: ${error.message || error}`);
            }
        });

        startPolling();
        loadData();
    </script>
</body>
</html>
